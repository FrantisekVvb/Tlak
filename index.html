<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tlak</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="toolbar toolbar--modes">
    <button
      type="button"
      class="mode-toggle"
      id="labModeBtn"
      aria-pressed="true"
    >
      Laboratoř
    </button>

    <button
      type="button"
      class="mode-toggle"
      id="pressureCalcToggleBtn"
      aria-pressed="false"
    >
      Výpočet tlaku
    </button>

    <button
      type="button"
      class="mode-toggle"
      id="weightCalcToggleBtn"
      aria-pressed="false"
    >
      Výpočet tíhy
    </button>

    <button
      type="button"
      class="mode-toggle"
      id="areaCalcToggleBtn"
      aria-pressed="false"
    >
      Výpočet plochy
    </button>
  </div>

  <div class="side-panel">
    <div class="stats-panel" aria-live="polite">
      <p class="stats-panel__item stats-panel__item--weight">
        <span class="stats-panel__weight-display" id="totalWeightDisplay">
          Celková tíha tělesa =
          <span class="stats-panel__value" id="totalWeightValue">0</span>
          N
        </span>
        <span class="stats-panel__calc" id="weightCalc" hidden>
          <span class="stats-panel__calc-row">
            Celková tíha tělesa =
            <span class="stats-panel__field">
              <input
                type="text"
                class="stats-panel__input"
                id="weightInput"
                inputmode="decimal"
                autocomplete="off"
                aria-label="Vypočtená tíha"
              />
            </span>
            N
          </span>
          <span class="stats-panel__feedback" id="weightFeedback" hidden></span>
        </span>
      </p>
      <p class="stats-panel__item stats-panel__item--area">
        <span class="stats-panel__area-display" id="areaDisplay">
          Celková plocha =
          <span class="stats-panel__value" id="totalAreaValue">0</span>
          m²
        </span>
        <span class="stats-panel__calc" id="areaCalc" hidden>
          <span class="stats-panel__calc-row">
            Celková plocha =
            <span class="stats-panel__field">
              <input
                type="text"
                class="stats-panel__input"
                id="areaInput"
                inputmode="decimal"
                autocomplete="off"
                aria-label="Vypočtená plocha"
              />
            </span>
            m²
          </span>
          <span class="stats-panel__feedback" id="areaFeedback" hidden></span>
        </span>
      </p>
      <p class="stats-panel__item stats-panel__item--pressure">
        <span class="stats-panel__pressure-display" id="pressureDisplay">
          Tlak =
          <span class="stats-panel__value" id="totalPressureValue">0</span>
          N na m²
        </span>
        <span class="stats-panel__calc" id="pressureCalc" hidden>
          <span class="stats-panel__calc-row">
            Tlak =
            <span class="stats-panel__field">
              <input
                type="text"
                class="stats-panel__input"
                id="pressureInput"
                inputmode="decimal"
                autocomplete="off"
                aria-label="Vypočtený tlak"
              />
            </span>
            N na m²
          </span>
          <span class="stats-panel__feedback" id="pressureFeedback" hidden></span>
        </span>
      </p>
    </div>

    <div class="math-keypad" id="mathKeypad" hidden aria-label="Matematická klávesnice">
      <button type="button" class="math-keypad__key" data-key="7">7</button>
      <button type="button" class="math-keypad__key" data-key="8">8</button>
      <button type="button" class="math-keypad__key" data-key="9">9</button>
      <button type="button" class="math-keypad__key" data-key="4">4</button>
      <button type="button" class="math-keypad__key" data-key="5">5</button>
      <button type="button" class="math-keypad__key" data-key="6">6</button>
      <button type="button" class="math-keypad__key" data-key="1">1</button>
      <button type="button" class="math-keypad__key" data-key="2">2</button>
      <button type="button" class="math-keypad__key" data-key="3">3</button>
      <button type="button" class="math-keypad__key math-keypad__key--ok" data-key="ok">OK</button>
      <button type="button" class="math-keypad__key" data-key="0">0</button>
      <button type="button" class="math-keypad__key math-keypad__key--action" data-key="backspace" aria-label="Smazat">⌫</button>
    </div>
  </div>

  <main class="scene" aria-label="Simulace tlaku">
    <div class="stage" id="stage">
      <div class="floor" id="floor" aria-label="Podlaha s 5 čtverci"></div>
      <div class="cube-layer" id="cubeLayer" aria-label="Krychle na ploše"></div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
